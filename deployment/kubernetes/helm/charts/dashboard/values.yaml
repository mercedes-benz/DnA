# Default values for i3postgresql.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

namespace: dashboard
image: vardhandevalla/dashboard-backend
imagePullPolicy: Always
imagePullSecret: 
  name: vddockerhub
dbUrl: jdbc:postgresql://dna-bitnamipostgresql.dna.svc.cluster.local:5432/db
secret:
  name: dashboard-secrets
  appUserName: postgres
  appPassword: postgres
  jwtKey: eyJhbGciOiJIUzI1NiJ9.eyJSb2xlIjoiQWRtaW4iLCJJc3N1ZXIiOiJJc3N1ZXIiLCJVc2VybmFtZSI6IkphdmFJblVzZSIsImV4cCI6MTY0OTY2Mzg5MCwiaWF0IjoxNjQ5NjYzODkwfQ.0bHIjToqnWk5zOq0a-Bn-HV6jw6-bnVCNx56L5QnVkg
appUrl: http://dna-service.dna.svc.cluster.local:7171
enableAuth: true
loggingPath: /tmp/dashboard/log
loggingEnvironment: dev
flywayBaseline: 
flywayBaselineOnMigrate: 
flywayBaselineVersion: 
flywaySchema: 
containerPort: 7173
ingress:
  enabled: true
  host: ""
  annotations:
    traefik.frontend.rule.type: PathPrefix
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: ""

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1000Mi"
    cpu: "500m"

probes:
  initialDelaySeconds: 120
  timeoutSeconds: 10
  periodSeconds: 20
  failureThreshold: 3
  livenessProbe:
    path: /dashboards/actuator/health/liveness
    port: api
      
  readinessProbe:
    path: /dashboards/actuator/health/readiness
    port: api

